name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx markdownlint-cli2 "**/*.md" "#node_modules"

  skill-schema:
    name: Skill schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "⚠ WARN: ${skill_dir} has no SKILL.md — skipping"
              continue
            fi

            echo "Validating ${skill_file}..."

            # Extract YAML frontmatter (between --- delimiters)
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$skill_file" | sed '1d;$d')

            if [ -z "$frontmatter" ]; then
              echo "✗ FAIL: ${skill_file} — missing YAML frontmatter"
              exit_code=1
              continue
            fi

            # Check required fields
            for field in name description; do
              if ! echo "$frontmatter" | grep -qE "^${field}:"; then
                echo "✗ FAIL: ${skill_file} — missing required field '${field}'"
                exit_code=1
              fi
            done

            # Check name matches directory name
            dir_name=$(basename "$skill_dir")
            yaml_name=$(echo "$frontmatter" | grep -E "^name:" | sed "s/^name:[[:space:]]*['\"]\\{0,1\\}//;s/['\"]\\{0,1\\}[[:space:]]*$//")
            if [ "$yaml_name" != "$dir_name" ]; then
              echo "✗ FAIL: ${skill_file} — name '${yaml_name}' does not match directory '${dir_name}'"
              exit_code=1
            fi

            if [ $exit_code -eq 0 ] || ! echo "$frontmatter" | grep -qE "^(name|description):"; then
              echo "✓ PASS: ${skill_file}"
            fi
          done

          exit $exit_code
